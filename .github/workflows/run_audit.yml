name: Lead Audit Run

on:
  workflow_dispatch: # Allows you to run it manually with a button click

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Lead Auditor
        env:
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
        run: |
          FILE_PATH=$(find . -name "audit_leads.py")
          if [ -z "$FILE_PATH" ]; then
            echo "CRITICAL: audit_leads.py was not found anywhere in the repo."
            ls -R
            exit 1
          else
            echo "Found file at: $FILE_PATH"
            python "$FILE_PATH"
          fi

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: audited-leads-csv
          path: audited_leads.csv
